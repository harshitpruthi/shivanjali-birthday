<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Shivanjali 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold: #D4AF37;
    --rose: #C9607A;
    --blush: #F7C5C5;
    --deep: #1a0a0f;
    --text-light: #fff9f2;
  }
  body {
    background: var(--deep);
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
    width: 100vw; height: 100vh;
  }
  .petal-container { position: fixed; inset: 0; pointer-events: none; z-index: 5; overflow: hidden; }
  .petal {
    position: absolute; border-radius: 0 50% 0 50%; opacity: 0.5;
    animation: fall linear infinite;
  }
  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 0.6; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }
  #slideshow { width: 100vw; height: 100vh; position: relative; cursor: pointer; }
  .slide {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    opacity: 0; transition: opacity 1.2s ease; overflow: hidden;
  }
  .slide.active { opacity: 1; }
  .photo-frame {
    position: relative; border-radius: 4px; overflow: hidden;
    box-shadow: 0 0 60px rgba(212,175,55,0.25), 0 20px 60px rgba(0,0,0,0.7);
    animation: none;
  }
  .slide.active .photo-frame { animation: zoomIn 8s ease forwards; }
  @keyframes zoomIn { from { transform: scale(1); } to { transform: scale(1.04); } }
  .photo-frame::after {
    content:''; position:absolute; inset:0;
    background: linear-gradient(to top, rgba(0,0,0,0.35) 0%, transparent 50%);
    pointer-events:none; z-index:1;
  }
  .caption {
    text-align: center; color: var(--text-light);
    margin-top: 20px; opacity: 0;
    animation: fadeUp 1s ease 0.6s forwards;
  }
  .slide.active .caption { animation: fadeUp 1s ease 0.6s forwards; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .tag {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    color: var(--gold); display: block; margin-bottom: 4px;
  }
  .sub {
    font-size: clamp(0.75rem, 1.5vw, 0.9rem);
    color: rgba(255,249,242,0.5); letter-spacing: 2px;
    text-transform: uppercase; font-weight: 300;
  }
  /* Intro */
  #slide-intro {
    background: radial-gradient(ellipse at 50% 40%, #2a0d1a 0%, #0d0308 70%);
    z-index: 2;
  }
  #slide-intro .inner { text-align: center; position: relative; z-index: 3; }
  .big-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 10vw, 8rem); font-weight: 700; font-style: italic;
    background: linear-gradient(135deg, #D4AF37 0%, #F5E27C 40%, #C9A227 70%, #D4AF37 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; line-height: 1;
    animation: goldPulse 3s ease infinite;
  }
  @keyframes goldPulse { 0%,100% { filter: brightness(1); } 50% { filter: brightness(1.3); } }
  .name-text {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(2rem, 8vw, 6rem); color: var(--blush);
    display: block; margin-top: 8px;
    animation: nameFloat 2s ease-in-out infinite;
  }
  @keyframes nameFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  .date-text {
    font-size: clamp(0.85rem, 2vw, 1.1rem); letter-spacing: 5px;
    text-transform: uppercase; color: rgba(212,175,55,0.7);
    margin-top: 20px; font-weight: 300;
  }
  .gold-ring {
    position: absolute;
    width: min(80vmin,500px); height: min(80vmin,500px);
    border: 1px solid rgba(212,175,55,0.15);
    border-radius: 50%; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    animation: spin 30s linear infinite;
  }
  .gold-ring::before {
    content:''; position:absolute;
    width:8px; height:8px; background:var(--gold);
    border-radius:50%; top:-4px; left:50%;
    transform:translateX(-50%);
    box-shadow:0 0 10px var(--gold);
  }
  @keyframes spin { from { transform:translate(-50%,-50%) rotate(0deg); } to { transform:translate(-50%,-50%) rotate(360deg); } }
  .sparkle {
    position:absolute; border-radius:50%; pointer-events:none;
    animation: sparkleAnim ease-in-out infinite;
  }
  @keyframes sparkleAnim { 0%,100% { opacity:0; transform:scale(0); } 50% { opacity:1; transform:scale(1); } }
  /* Slide bgs */
  .bg-romantic { background: radial-gradient(ellipse at 30% 50%, #2a0d1a, #0d0308); }
  .bg-warm { background: radial-gradient(ellipse at 70% 50%, #1a0d05, #0d0507); }
  .bg-cool { background: radial-gradient(ellipse at 50% 30%, #060d1a, #030608); }
  .bg-golden { background: radial-gradient(ellipse at 50% 50%, #1a1005, #0a0800); }
  /* Finale */
  #slide-finale { background: radial-gradient(ellipse at 50% 50%, #1a0a10, #070206); }
  .finale-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 7vw, 5.5rem); font-style: italic;
    color: var(--gold); text-align: center; line-height: 1.2;
    animation: finalePulse 2s ease infinite;
  }
  @keyframes finalePulse {
    0%,100% { text-shadow: 0 0 40px rgba(212,175,55,0.4); }
    50% { text-shadow: 0 0 80px rgba(212,175,55,0.8), 0 0 120px rgba(201,96,122,0.4); }
  }
  .sub-finale {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.1rem, 3vw, 2rem); color: var(--blush);
    margin-top: 14px; display: block;
  }
  #progress-bar {
    position: fixed; bottom: 0; left: 0; height: 3px;
    background: linear-gradient(90deg, var(--rose), var(--gold));
    z-index: 100; transition: width 0.1s linear;
  }
  #counter {
    position: fixed; bottom: 16px; right: 20px;
    font-size: 0.7rem; letter-spacing: 3px;
    color: rgba(255,255,255,0.25); z-index: 100;
  }
  #replay-btn {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
    background: transparent; border: 1px solid rgba(212,175,55,0.5);
    color: var(--gold); font-family: 'Cormorant Garamond', serif;
    font-size: 0.85rem; letter-spacing: 3px; text-transform: uppercase;
    padding: 10px 24px; cursor: pointer; opacity: 0; transition: all 0.5s; z-index: 100;
  }
  #replay-btn:hover { background: rgba(212,175,55,0.1); }
  #replay-btn.visible { opacity: 1; }
  @keyframes burstOut {
    0% { opacity:1; transform:translate(0,0) scale(0.5); }
    100% { opacity:0; transform:translate(var(--tx),var(--ty)) scale(1.5); }
  }
</style>
</head>

  const total=slides.length;
  let current=0, timer=null;
  const durations=[3500, 4200, 4200, 4200, 4200, 4200, 4200, 4200, 6000];
  const pb=document.getElementById('progress-bar');
  const ctr=document.getElementById('counter');
  const bdayAudio = document.getElementById('birthday-song');

  function showSlide(idx) {
    slides.forEach((s,i) => {
      s.classList.toggle('active', i===idx);
      if (i===idx) {
        const cap = s.querySelector('.caption');
        if(cap) { cap.style.animation='none'; cap.offsetHeight; cap.style.animation=''; }
        const pf = s.querySelector('.photo-frame');
        if(pf) { pf.style.animation='none'; pf.offsetHeight; pf.style.animation=''; }
      }
    });
    ctr.textContent = (idx===0||idx===total-1)?'': `${idx} / ${total-2}`;
    animateProgress(durations[idx]);
    if(idx===total-1) { burstHearts(); document.getElementById('replay-btn').classList.add('visible'); }
  }

  function animateProgress(dur) {
    pb.style.transition='none'; pb.style.width='0%';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      pb.style.transition=`width ${dur}ms linear`; pb.style.width='100%';
    }));
  }

  function nextSlide() {
    if(current<total-1) {
      current++; showSlide(current);
      if(current<total-1) timer=setTimeout(nextSlide, durations[current]);
    }
  }

  function startShow() {
    // Attempt to play audio
    if(bdayAudio) {
      bdayAudio.play().catch(e => console.log("Audio play blocked: click again"));
    }
    // Start transitions
    if(current === 0) {
        clearTimeout(timer);
        nextSlide();
    }
  }

  function restartShow() {
    clearTimeout(timer); current=0;
    document.getElementById('replay-btn').classList.remove('visible');
    document.getElementById('heart-container').innerHTML='';
    showSlide(0); timer=setTimeout(nextSlide, durations[0]);
  }

  function burstHearts() {
    const hc=document.getElementById('heart-container');
    hc.innerHTML='';
    const emojis=['❤️','💕','🌹','✨','💫','🌸'];
    for(let i=0;i<24;i++) {
      const h=document.createElement('div');
      h.style.cssText=`position:absolute;font-size:${1+Math.random()*1.5}rem;left:50%;top:50%;--tx:${(Math.random()-0.5)*400}px;--ty:${(Math.random()-0.5)*400}px;animation:burstOut ${1.5+Math.random()}s ease ${Math.random()*2}s forwards;opacity:0`;
      h.textContent=emojis[Math.floor(Math.random()*emojis.length)];
      hc.appendChild(h);
    }
  }

  // Event Listeners
  document.getElementById('slideshow').addEventListener('click', startShow);
  
  // Initialize first slide
  showSlide(0);
  timer=setTimeout(nextSlide, durations[0]);
</script>

</body>
</html>
